<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaveUp</title>

<link rel="stylesheet" href="estilizacao.css">

<style>
/* Força o card a ter uma largura máxima maior para caber os dois lados lado a lado */
.card {
    width: 100%;
    max-width: 750px; /* Ajuste esse valor dependendo do tamanho que quer o card total */
    margin: 0 auto;
}

/* Ajustes de layout para colocar a imagem na esquerda e o formulário na direita */
.card-layout-split {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    /* O wrap continua ativo para telas de celular, mas em telas grandes eles ficam lado a lado */
    flex-wrap: wrap; 
}

.lado-esquerda {
    flex: 1;
    min-width: 250px;
    max-width: 320px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.lado-direita {
    flex: 1;
    min-width: 300px;
    max-width: 380px;
}

.logo-split {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 8px;
}
</style>
</head>
<body>

<div class="container">

<div class="card">

    <div class="card-layout-split">
        
        <div class="lado-esquerda">
            <img src="loguinho.jpeg" alt="SaveUp Logo" class="logo-split">
        </div>

        <div class="lado-direita">
            
            <p class="subtitulo" style="text-align: center; margin-top: 0;">
                Organize sua vida financeira
            </p>

            <div class="abas">
                <button onclick="mostrarCadastro()">Cadastro</button>
                <button onclick="mostrarLogin()">Login</button>
            </div>

            <div id="cadastroBox">
                <input type="text" id="nomeCadastro" placeholder="Nome">
                <input type="email" id="emailCadastro" placeholder="E-mail">
                
                <input type="text" id="cpfCadastro" maxlength="14" placeholder="CPF (000.000.000-00)" oninput="mascaraCPF(this)">

                <label style="display: block; text-align: left; font-size: 0.85rem; color: #94a3b8; margin: 10px 0 2px 5px;">Data de Nascimento:</label>
                <input type="date" id="dataNascimentoCadastro">

                <input type="password" id="senhaCadastro" placeholder="Senha">
                <button onclick="cadastrar()">Criar Conta</button>
            </div>

            <div id="loginBox" style="display:none;">
                <input type="email" id="emailLogin" placeholder="E-mail">
                <input type="password" id="senhaLogin" placeholder="Senha">
                <button onclick="login()">Entrar</button>
            </div>

            <p id="mensagem" style="text-align: center;"></p>

        </div>

    </div>

</div>

</div>

<script>
function mostrarCadastro(){
    document.getElementById("cadastroBox").style.display="block";
    document.getElementById("loginBox").style.display="none";
}

function mostrarLogin(){
    document.getElementById("cadastroBox").style.display="none";
    document.getElementById("loginBox").style.display="block";
}

function mascaraCPF(input) {
    let v = input.value.replace(/\D/g, "");
    v = v.replace(/^(\d{3})(\d)/, "$1.$2");
    v = v.replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3");
    v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
    input.value = v;
}

async function cadastrar(){
    let nome = document.getElementById("nomeCadastro").value;
    let email = document.getElementById("emailCadastro").value;
    let cpf = document.getElementById("cpfCadastro").value;
    let data_nascimento = document.getElementById("dataNascimentoCadastro").value;
    let senha = document.getElementById("senhaCadastro").value;

    let rls_body = "nome="+encodeURIComponent(nome)+
    "&email="+encodeURIComponent(email)+
    "&cpf="+encodeURIComponent(cpf)+
    "&data_nascimento="+encodeURIComponent(data_nascimento)+
    "&senha="+encodeURIComponent(senha);

    let resposta = await fetch("cadastro.php",{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body: rls_body
    });

    let resultado = await resposta.text();

    if(resultado.trim()=="sucesso"){
        window.location.href="inicio.php";
    }else{
        document.getElementById("mensagem").innerText=resultado;
    }
}

async function login(){
    let email = document.getElementById("emailLogin").value;
    let senha = document.getElementById("senhaLogin").value;

    let resposta = await fetch("login.php",{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:
        "email="+encodeURIComponent(email)+
        "&senha="+encodeURIComponent(senha)
    });

    let resultado = await resposta.text();

    if(resultado.trim()=="sucesso"){
        window.location.href="inicio.php";
    }else{
        document.getElementById("mensagem").innerText="E-mail ou senha incorretos";
    }
}
</script>

</body>
</html>
